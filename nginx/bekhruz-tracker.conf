# Bekhruz Performance Tracker — nginx config
# NOTE: The existing app on port 80 must NOT be disturbed.
# Option A (recommended): run this app on port 8080 as a separate server block.
# Option B: use path prefix /tracker/ on port 80.
# Uncomment the block that matches your chosen strategy.

# ─── Option A: separate port 8080 ───────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    root /home/bekhruz/tracker/client/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

